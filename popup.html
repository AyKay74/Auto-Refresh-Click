<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Auto Refresh & Click</title>
<style>
  body { width: 320px; font-family: Arial, sans-serif; font-size: 13px; color: #222; margin: 0; padding: 12px; }
  .header-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
  h1 { font-size: 14px; margin: 0; }
  .author { font-size: 11px; color: #777; opacity: 0.85; }
  label { display: block; margin-top: 8px; font-weight: bold; }
  input[type="text"], input[type="number"], select { width: 100%; box-sizing: border-box; padding: 4px 6px; margin-top: 2px; font-size: 13px; }
  .row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .row label { margin: 0; }
  .hint { font-size: 11px; color: #666; margin-top: 2px; }
  .buttons { display: flex; gap: 8px; margin-top: 12px; }
  button { flex: 1; padding: 6px 8px; font-size: 13px; cursor: pointer; }
  
  /* Footer layout for status text and tip link */
  .footer-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; min-height: 16px; }
  #status { font-size: 12px; color: #2a7a2a; margin: 0; }
  .tip-link { font-size: 11px; color: #1a73e8; text-decoration: none; display: inline-flex; align-items: center; gap: 3px; }
  .tip-link:hover { text-decoration: underline; }
  .heart { font-size: 11px; }
  
  hr { margin: 12px 0; border: none; border-top: 1px solid #ddd; }
</style>
</head>
<body>
  <div class="header-row">
    <h1>Auto Refresh & Click</h1>
    <span class="author">Made by AyKay</span>
  </div>

  <div class="row">
    <label for="enabled">Enabled</label>
    <input type="checkbox" id="enabled" checked />
  </div>
  <div class="hint">Saves instantly. Clicking anywhere on the page turns this off automatically, check it again here or reload the page to resume.</div>

  <hr />

  <label for="interval">Check interval (seconds)</label>
  <input type="number" id="interval" min="1" step="1" value="5" />

  <label for="refreshMode">Refresh type</label>
  <select id="refreshMode">
    <option value="soft" selected>Quick reload (may use cache, faster)</option>
    <option value="hard">Full reload (bypasses cache, slower)</option>
  </select>

  <label for="buttonText">Text/Button to look for</label>
  <input type="text" id="buttonText" value="" />

  <label for="matchMode">Text match mode</label>
  <select id="matchMode">
    <option value="contains" selected>Contains text</option>
    <option value="exact">Exact match</option>
  </select>

  <label for="urlFilterMode">Run only on</label>
  <select id="urlFilterMode">
    <option value="contains" selected>URL containing...</option>
    <option value="exact">This exact page (ignores ?query params)</option>
    <option value="any">Any website</option>
  </select>
  <input type="text" id="urlFilterValue" value="" placeholder="e.g., https://example.com" />

  <div class="row">
    <label for="autoClickEnabled">Auto-click target</label>
    <input type="checkbox" id="autoClickEnabled" checked />
  </div>

  <div class="row">
    <label for="stopOnFound">Stop refresh when target found</label>
    <input type="checkbox" id="stopOnFound" />
  </div>

  <div class="row">
    <label for="soundEnabled">Play sound when target found</label>
    <input type="checkbox" id="soundEnabled" checked />
  </div>

  <div class="row">
    <label for="volume">Sound volume</label>
    <input type="range" id="volume" min="0" max="1" step="0.05" value="0.5" style="width: 120px; margin: 0;" />
  </div>

  <div class="buttons">
    <button id="save">Save</button>
    <button id="testSound">Test sound</button>
  </div>
  
  <div class="footer-row">
    <div id="status"></div>
    <a href="tips.html" id="tipLink" class="tip-link">Tips/Donations <span class="heart">❤️</span></a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
